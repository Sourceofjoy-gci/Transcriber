name: transcriber

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transcriber
      POSTGRES_USER: transcriber
      POSTGRES_PASSWORD: transcriber
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcriber -d transcriber"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_data:/data
    networks: [internal]

  clamav:
    profiles: ["clamav"]
    image: clamav/clamav:stable
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks: [internal]

  api:
    build:
      context: ./backend
      target: api
    env_file: .env
    command: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/lib/transcriber/storage
      - model_data:/var/lib/transcriber/models:ro
    networks: [internal]

  worker-cpu:
    profiles: ["cpu"]
    build:
      context: ./backend
      target: worker
      args:
        WORKER_EXTRAS: ai
    env_file: .env
    command: celery -A app.worker.celery_app worker --loglevel=INFO --queues=media,maintenance,transcription.cpu,exports --concurrency=${CELERY_CPU_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/lib/transcriber/storage
      - model_data:/var/lib/transcriber/models
    networks: [internal]

  worker-gpu:
    profiles: ["gpu"]
    build:
      context: ./backend
      target: worker
      args:
        WORKER_EXTRAS: ai,advanced-speech
        WORKER_LOCK: requirements.lock
    env_file: .env
    command: celery -A app.worker.celery_app worker --loglevel=INFO --queues=transcription.gpu --concurrency=${CELERY_GPU_CONCURRENCY:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/lib/transcriber/storage
      - model_data:/var/lib/transcriber/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [internal]

  caddy:
    build:
      context: .
      dockerfile: infra/caddy/Dockerfile
    depends_on:
      - api
    ports:
      - "8088:8080"
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:
  model_data:
